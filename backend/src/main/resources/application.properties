spring.application.name=assettrack

# Database connection - Neon (cloud PostgreSQL)
spring.datasource.url=jdbc:postgresql://ep-little-mountain-aprgdbby-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=YOUR_PASSWORD_HERE
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP SSL settings for Neon
spring.datasource.hikari.data-source-properties.sslmode=require

# JWT
jwt.secret=b2JqZWN0aXZlbHktaGFzaGVkLXNlY3JldC1rZXktZm9yLWFzc2V0dHJhY2s=
jwt.expiration-ms=86400000

# CORS
cors.allowed-origins=http://localhost:5173

# Spring Data JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Removed: spring.jpa.properties.hibernate.dialect (auto-detected by Hibernate 7)
spring.jpa.open-in-view=false

# Expiration tracking
assettrack.expiration.window-days=30

# Email (MailHog - local test SMTP, no auth needed)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
assettrack.mail.from=noreply@assettrack.local

# Scheduling
spring.task.scheduling.pool.size=2
